<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <!-- Premium glowing gradients matching Drasa AI branding -->
    <linearGradient id="gradient-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA" /> <!-- Light Purple -->
      <stop offset="50%" stop-color="#EC4899" /> <!-- Pink -->
      <stop offset="100%" stop-color="#F43F5E" /> <!-- Rose/Coral -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <style>
    .bg-shape {
      fill: #0B0A11;
      transition: fill 0.3s ease;
    }
    @media (prefers-color-scheme: light) {
      .bg-shape {
        fill: #F4F4F6;
      }
    }
  </style>

  <!-- Premium rounded square background container -->
  <rect class="bg-shape" width="128" height="128" rx="32" />

  <!-- Glowing futuristic 'D' monogram loop -->
  <path d="M 46 32 
           C 68 28, 96 32, 96 64 
           C 96 96, 68 100, 46 96 
           C 38 94, 34 86, 38 78 
           C 42 70, 50 70, 54 76
           C 64 82, 80 82, 80 64
           C 80 46, 64 46, 54 52
           C 50 54, 42 48, 38 42
           C 34 34, 38 32, 46 32 Z"
        fill="url(#gradient-accent)"
        filter="url(#glow)" />
        
  <!-- Subtle inner ribbon detail for depth -->
  <path d="M 44 44
           C 54 40, 72 44, 72 64
           C 72 84, 54 88, 44 84"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="3"
        stroke-linecap="round"
        opacity="0.8" />
        
  <!-- Futuristic AI spark/star icon in top-right -->
  <path d="M 94 40 Q 98 40 98 36 Q 98 40 102 40 Q 98 40 98 44 Q 98 40 94 40 Z" 
        fill="#FFFFFF" />
</svg>
